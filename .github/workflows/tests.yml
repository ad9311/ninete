name: tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-tests:
    name: go-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Create .env file
        run: cp .env.example .env

      - name: Run tests
        run: |
          mkdir -p ./build
          mkdir -p ./data/db/test
          CGO_ENABLED=1 go build -o ./build/dev ./cmd/ninete/main.go
          ENV=test go test ./...
