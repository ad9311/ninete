{{ template "layout" . }}
{{ define "main" }}
  <section class="auth-page">
    <div class="auth-card">
      <h1>REGISTER</h1>
      {{ template "form_error" . }}
      <form action="/register" method="post" class="form-stack">
        {{ template "csrf" . }}
        <input
          type="text"
          placeholder="Username"
          name="username"
          autocomplete="username"
        />
        <input
          type="email"
          placeholder="Email"
          name="email"
          autocomplete="email"
        />
        <input
          type="password"
          placeholder="Password"
          name="password"
          autocomplete="new-password"
        />
        <input
          type="password"
          placeholder="Password Confirmation"
          name="passwordConfirmation"
          autocomplete="new-password"
        />
        <input
          type="text"
          placeholder="Invitation Code"
          name="invitationCode"
        />
        <button
          type="submit"
          class="btn-primary"
          data-turbo-submits-with="Registering..."
        >
          Register
        </button>
      </form>
      <p class="auth-switch">
        Already have an account? <a href="/login">Login</a>
      </p>
    </div>
  </section>
{{ end }}
