{{ template "layout" . }}
{{ define "main" }}
  <section class="auth-page">
    <div class="auth-card">
      <h1>REGISTER</h1>
      {{ template "form_error" . }}
      <form action="/register" method="post" class="form-stack">
        {{ template "csrf" . }}
        <label>
          Username
          <input type="text" name="username" autocomplete="username" />
        </label>
        <label>
          Email
          <input type="email" name="email" autocomplete="email" />
        </label>
        <label>
          Password
          <input type="password" name="password" autocomplete="new-password" />
        </label>
        <label>
          Password confirmation
          <input
            type="password"
            name="passwordConfirmation"
            autocomplete="new-password"
          />
        </label>
        <label>
          Invitation code
          <input type="text" name="invitationCode" />
        </label>
        <button
          type="submit"
          class="btn-primary"
          data-turbo-submits-with="Registering..."
        >
          Register
        </button>
      </form>
      <p class="auth-switch">
        Already have an account? <a href="/login">Login</a>
      </p>
    </div>
  </section>
{{ end }}
