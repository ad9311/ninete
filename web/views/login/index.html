{{ template "layout" . }}
{{ define "main" }}
  <section class="auth-page">
    <div class="auth-card">
      <h1>LOGIN</h1>
      {{ template "form_error" . }}
      <form action="/login" method="post" class="form-stack">
        {{ template "csrf" . }}
        <label>
          Email
          <input type="email" name="email" autocomplete="email" />
        </label>
        <label>
          Password
          <input
            type="password"
            name="password"
            autocomplete="current-password"
          />
        </label>
        <button
          type="submit"
          class="btn-primary"
          data-turbo-submits-with="Logging in..."
        >
          Login
        </button>
      </form>
      <p class="auth-switch">
        Need an account? <a href="/register">Register</a>
      </p>
    </div>
  </section>
{{ end }}
