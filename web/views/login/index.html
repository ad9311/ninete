{{ template "layout" . }}
{{ define "main" }}
  <section class="auth-page">
    <div class="auth-card">
      <h1>LOGIN</h1>
      {{ template "form_error" . }}
      <form action="/login" method="post" class="form-stack">
        {{ template "csrf" . }}
        <input
          type="email"
          placeholder="Email"
          name="email"
          autocomplete="email"
        />
        <input
          type="password"
          placeholder="Password"
          name="password"
          autocomplete="current-password"
        />
        <button
          type="submit"
          class="btn-primary"
          data-turbo-submits-with="Logging in..."
        >
          Login
        </button>
      </form>
      <p class="auth-switch">
        Need an account? <a href="/register">Register</a>
      </p>
    </div>
  </section>
{{ end }}
