{{ template "layout" . }}
{{ define "main" }}
  <section class="card" aria-labelledby="new-mood-entry-card-title">
    <header class="card-header">
      <h1 id="new-mood-entry-card-title" class="card-title">New mood entry</h1>
      <nav class="card-actions" aria-label="Mood navigation">
        <a
          href="/moods"
          class="card-action-link"
          aria-label="Moods"
          title="Moods"
        >
          <i data-lucide="smile" class="card-action-icon"></i>
        </a>
      </nav>
    </header>
    {{ template "form_error" . }}
    <form
      action="/moods"
      method="post"
      data-controller="date"
      data-action="submit->date#prepare"
    >
      {{ template "csrf" . }}
      {{ template "mood_entry_form" . }}
    </form>
  </section>
{{ end }}
