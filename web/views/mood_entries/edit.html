{{ template "layout" . }}
{{ define "main" }}
  <h1>EDIT MOOD ENTRY</h1>
  <nav class="page-links">
    <a href="/moods/{{ .moodEntry.ID }}">Visit Mood Entry</a>
    <a href="/moods">Moods</a>
  </nav>
  <section class="form-card">
    {{ template "form_error" . }}
    <form
      action="/moods/{{ .moodEntry.ID }}"
      method="post"
      data-controller="date"
      data-action="submit->date#prepare"
    >
      {{ template "csrf" . }}
      {{ template "mood_entry_form" . }}
    </form>
  </section>
{{ end }}
