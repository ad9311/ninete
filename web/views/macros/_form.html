{{ define "macro_entry_form" }}
  <label>
    Meal
    <select name="meal_type">
      <option
        value="breakfast"
        {{ if eq .entry.MealType "breakfast" }}selected{{ end }}
      >
        Breakfast
      </option>
      <option
        value="lunch"
        {{ if eq .entry.MealType "lunch" }}selected{{ end }}
      >
        Lunch
      </option>
      <option
        value="dinner"
        {{ if eq .entry.MealType "dinner" }}selected{{ end }}
      >
        Dinner
      </option>
      <option
        value="snack"
        {{ if eq .entry.MealType "snack" }}selected{{ end }}
      >
        Snack
      </option>
      <option
        value="other"
        {{ if eq .entry.MealType "other" }}selected{{ end }}
      >
        Other
      </option>
    </select>
  </label>
  <label>
    Name
    <input type="text" name="name" value="{{ .entry.Name }}" />
  </label>
  <label>
    Kcal
    <input
      type="number"
      min="0"
      step="0.01"
      name="kcal"
      value="{{ .entry.Kcal }}"
      data-macro-calc-target="kcal"
    />
  </label>
  <label>
    Protein (g)
    <input
      type="number"
      min="0"
      step="0.01"
      name="protein_g"
      value="{{ .entry.ProteinG }}"
      data-macro-calc-target="protein"
    />
  </label>
  <label>
    Carbs (g)
    <input
      type="number"
      min="0"
      step="0.01"
      name="carbs_g"
      value="{{ .entry.CarbsG }}"
      data-macro-calc-target="carbs"
    />
  </label>
  <label>
    Fat (g)
    <input
      type="number"
      min="0"
      step="0.01"
      name="fat_g"
      value="{{ .entry.FatG }}"
      data-macro-calc-target="fat"
    />
  </label>
  <label>
    Date
    <input type="date" data-date-target="local" />
  </label>
  <input
    type="hidden"
    name="date"
    data-date-target="value"
    value="{{ .entry.Date }}"
  />
  <button type="submit" class="btn-primary" data-turbo-submits-with="Saving...">
    Submit
  </button>
{{ end }}
