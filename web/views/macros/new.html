{{ template "layout" . }}
{{ define "main" }}
  <h1>NEW MACRO ENTRY</h1>
  <nav class="page-links">
    <a href="/macros">Macros</a>
  </nav>
  <section class="form-card">
    {{ template "form_error" . }}
    <form
      action="/macros"
      method="post"
      data-controller="date"
      data-action="submit->date#prepare"
    >
      {{ template "csrf" . }}
      {{ template "macro_entry_form" . }}
      <label>
        Save as template
        <input type="checkbox" name="save_as_template" value="on" />
      </label>
    </form>
  </section>
{{ end }}
