{{ template "layout" . }}
{{ define "main" }}
  <h1>MACRO GOALS</h1>
  <nav class="page-links">
    <a href="/macros">Macros</a>
  </nav>
  <section class="form-card">
    {{ template "form_error" . }}
    <form action="/macros/goals" method="post">
      {{ template "csrf" . }}
      <label>
        Kcal
        <input
          type="number"
          min="0.01"
          step="0.01"
          name="kcal"
          value="{{ .goal.Kcal }}"
        />
      </label>
      <label>
        Protein (g)
        <input
          type="number"
          min="0.01"
          step="0.01"
          name="protein_g"
          value="{{ .goal.ProteinG }}"
        />
      </label>
      <label>
        Carbs (g)
        <input
          type="number"
          min="0.01"
          step="0.01"
          name="carbs_g"
          value="{{ .goal.CarbsG }}"
        />
      </label>
      <label>
        Fat (g)
        <input
          type="number"
          min="0.01"
          step="0.01"
          name="fat_g"
          value="{{ .goal.FatG }}"
        />
      </label>
      <label>
        Saturated Fat (g)
        <input
          type="number"
          min="0"
          step="0.01"
          name="saturated_fat_g"
          value="{{ .goal.SaturatedFatG }}"
        />
      </label>
      <label>
        Fiber (g)
        <input
          type="number"
          min="0"
          step="0.01"
          name="fiber_g"
          value="{{ .goal.FiberG }}"
        />
      </label>
      <label>
        Sodium (g)
        <input
          type="number"
          min="0"
          step="0.01"
          name="sodium_g"
          value="{{ .goal.SodiumG }}"
        />
      </label>
      <button
        type="submit"
        class="btn-primary"
        data-turbo-submits-with="Saving..."
      >
        Save Goals
      </button>
    </form>
  </section>
{{ end }}
