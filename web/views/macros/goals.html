{{ template "layout" . }}
{{ define "main" }}
  <section class="card" aria-labelledby="macro-goals-card-title">
    <header class="card-header">
      <h1 id="macro-goals-card-title" class="card-title">Macro goals</h1>
      <nav class="card-actions" aria-label="Macro navigation">
        <a
          href="/macros"
          class="card-action-link"
          aria-label="Macros"
          title="Macros"
        >
          <i data-lucide="salad" class="card-action-icon"></i>
        </a>
      </nav>
    </header>
    {{ template "form_error" . }}
    <form action="/macros/goals" method="post">
      {{ template "csrf" . }}
      <label>
        Kcal
        <input
          type="number"
          min="0.01"
          step="0.01"
          name="kcal"
          value="{{ .goal.Kcal }}"
        />
      </label>
      <label>
        Protein (g)
        <input
          type="number"
          min="0.01"
          step="0.01"
          name="protein_g"
          value="{{ .goal.ProteinG }}"
        />
      </label>
      <label>
        Carbs (g)
        <input
          type="number"
          min="0.01"
          step="0.01"
          name="carbs_g"
          value="{{ .goal.CarbsG }}"
        />
      </label>
      <label>
        Fat (g)
        <input
          type="number"
          min="0.01"
          step="0.01"
          name="fat_g"
          value="{{ .goal.FatG }}"
        />
      </label>
      <label>
        Saturated Fat (g)
        <input
          type="number"
          min="0"
          step="0.01"
          name="saturated_fat_g"
          value="{{ .goal.SaturatedFatG }}"
        />
      </label>
      <label>
        Fiber (g)
        <input
          type="number"
          min="0"
          step="0.01"
          name="fiber_g"
          value="{{ .goal.FiberG }}"
        />
      </label>
      <label>
        Sodium (g)
        <input
          type="number"
          min="0"
          step="0.01"
          name="sodium_g"
          value="{{ .goal.SodiumG }}"
        />
      </label>
      <button
        type="submit"
        class="btn-primary form-submit"
        data-turbo-submits-with="Saving..."
      >
        Save Goals
      </button>
    </form>
  </section>
{{ end }}
