{{ template "layout" . }}
{{ define "main" }}
  <h1>MACRO GOALS</h1>
  <nav class="page-links">
    <a href="/macros">Macros</a>
  </nav>
  <section class="form-card">
    {{ template "form_error" . }}
    <form action="/macros/goals" method="post">
      {{ template "csrf" . }}
      <input
        type="number"
        min="0"
        placeholder="Kcal goal"
        name="kcal"
        value="{{ .goal.Kcal }}"
      />
      <input
        type="number"
        min="0"
        placeholder="Protein goal (g)"
        name="protein_g"
        value="{{ .goal.ProteinG }}"
      />
      <input
        type="number"
        min="0"
        placeholder="Carbs goal (g)"
        name="carbs_g"
        value="{{ .goal.CarbsG }}"
      />
      <input
        type="number"
        min="0"
        placeholder="Fat goal (g)"
        name="fat_g"
        value="{{ .goal.FatG }}"
      />
      <button
        type="submit"
        class="btn-primary"
        data-turbo-submits-with="Saving..."
      >
        Save Goals
      </button>
    </form>
  </section>
{{ end }}
