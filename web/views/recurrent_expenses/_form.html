{{ define "recurrent_expense_form" }}
  <label>
    Category
    <select name="category_id">
      {{ range .categories }}
        <option
          value="{{ .ID }}"
          {{ if eq .ID $.recurrentExpense.CategoryID }}selected{{ end }}
        >
          {{ .Name }}
        </option>
      {{ end }}
    </select>
  </label>
  <label>
    Description
    <input
      type="text"
      name="description"
      value="{{ .recurrentExpense.Description }}"
      placeholder="New purchase..."
    />
  </label>
  <label>
    Amount
    <input
      type="number"
      min="0"
      step="0.01"
      data-amount-target="local"
      data-action="input->amount#sync"
    />
  </label>
  <input
    type="hidden"
    name="amount"
    data-amount-target="value"
    value="{{ .recurrentExpense.Amount }}"
  />
  <label>
    Period (months)
    <input
      type="number"
      min="1"
      step="1"
      name="period"
      value="{{ .recurrentExpense.Period }}"
    />
  </label>
  <button
    type="submit"
    class="btn-primary form-submit"
    data-turbo-submits-with="Saving..."
  >
    Submit
  </button>
{{ end }}
