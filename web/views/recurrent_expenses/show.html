{{ template "layout" . }}
{{ define "main" }}
  <section class="card" aria-labelledby="recurrent-expense-card-title">
    <header class="card-header">
      <h1 id="recurrent-expense-card-title" class="card-title">
        Recurrent expense
      </h1>
      <nav class="card-actions" aria-label="Recurrent expense navigation">
        <a
          href="/recurrent-expenses/{{ .recurrentExpense.ID }}/edit"
          class="card-action-link"
          aria-label="Edit recurrent expense"
          title="Edit recurrent expense"
        >
          <i data-lucide="square-pen" class="card-action-icon"></i>
        </a>
        <a
          href="/recurrent-expenses"
          class="card-action-link"
          aria-label="Recurrent expenses"
          title="Recurrent expenses"
        >
          <i data-lucide="repeat" class="card-action-icon"></i>
        </a>
        <a
          href="/expenses"
          class="card-action-link"
          aria-label="Expenses"
          title="Expenses"
        >
          <i data-lucide="wallet" class="card-action-icon"></i>
        </a>
        <form
          action="/recurrent-expenses/{{ .recurrentExpense.ID }}/delete"
          method="post"
          data-turbo-confirm="Delete this recurrent expense?"
        >
          {{ template "csrf" . }}
          <button
            type="submit"
            class="card-action-link is-danger"
            aria-label="Delete recurrent expense"
            title="Delete recurrent expense"
            data-turbo-submits-with="Deleting..."
          >
            <i data-lucide="trash-2" class="card-action-icon"></i>
          </button>
        </form>
      </nav>
    </header>
    <table>
      <tbody>
        <tr>
          <th>Category</th>
          <td>{{ .recurrentExpense.CategoryName }}</td>
        </tr>
        <tr>
          <th>Description</th>
          <td>{{ .recurrentExpense.Description }}</td>
        </tr>
        <tr>
          <th>Amount</th>
          <td class="amount-value">
            {{ .recurrentExpense.Amount | currency }}
          </td>
        </tr>
        <tr>
          <th>Period (months)</th>
          <td>{{ .recurrentExpense.Period }}</td>
        </tr>
      </tbody>
    </table>
  </section>
{{ end }}
