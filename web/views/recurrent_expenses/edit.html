{{ template "layout" . }}
{{ define "main" }}
  <section class="card" aria-labelledby="edit-recurrent-expense-card-title">
    <header class="card-header">
      <h1 id="edit-recurrent-expense-card-title" class="card-title">
        Edit recurrent expense
      </h1>
      <nav class="card-actions" aria-label="Recurrent expense navigation">
        <a
          href="/recurrent-expenses/{{ .recurrentExpense.ID }}"
          class="card-action-link"
          aria-label="View recurrent expense"
          title="View recurrent expense"
        >
          <i data-lucide="eye" class="card-action-icon"></i>
        </a>
        <a
          href="/recurrent-expenses"
          class="card-action-link"
          aria-label="Recurrent expenses"
          title="Recurrent expenses"
        >
          <i data-lucide="repeat" class="card-action-icon"></i>
        </a>
        <a
          href="/expenses"
          class="card-action-link"
          aria-label="Expenses"
          title="Expenses"
        >
          <i data-lucide="wallet" class="card-action-icon"></i>
        </a>
      </nav>
    </header>
    {{ template "form_error" . }}
    <form
      action="/recurrent-expenses/{{ .recurrentExpense.ID }}"
      method="post"
      data-controller="amount"
      data-action="submit->amount#prepare"
    >
      {{ template "csrf" . }}
      {{ template "recurrent_expense_form" . }}
    </form>
  </section>
{{ end }}
