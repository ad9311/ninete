{{ define "expense_form" }}
  <label>
    Category
    <select name="category_id">
      {{ range .categories }}
        <option
          value="{{ .ID }}"
          {{ if eq .ID $.expense.CategoryID }}selected{{ end }}
        >
          {{ .Name }}
        </option>
      {{ end }}
    </select>
  </label>
  <label>
    Description
    <input type="text" name="description" value="{{ .expense.Description }}" />
  </label>
  <label>
    Amount
    <input
      type="number"
      min="0"
      step="0.01"
      data-amount-target="local"
      data-action="input->amount#sync"
    />
  </label>
  <input
    type="hidden"
    name="amount"
    data-amount-target="value"
    value="{{ .expense.Amount }}"
  />
  <label>
    Tags
    <input
      type="text"
      placeholder="Semicolon separated"
      name="tags"
      value="{{ .tagsInput }}"
    />
  </label>
  <label>
    Date
    <input type="date" data-date-target="local" />
  </label>
  <input
    type="hidden"
    name="date"
    data-date-target="value"
    value="{{ .expense.Date }}"
  />
  <button type="submit" class="btn-primary" data-turbo-submits-with="Saving...">
    Submit
  </button>
{{ end }}
