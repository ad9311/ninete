{{ define "quick_expense_form" }}
  <form action="/expenses/quick" method="post">
    {{ template "csrf" . }}
    <label>
      <span class="quick-label-row">
        Quick add
        <span class="date-help" data-controller="date-help">
          <button
            type="button"
            class="date-help-toggle"
            data-date-help-target="toggle"
            data-action="date-help#toggle"
            aria-label="Show accepted date formats"
            aria-expanded="false"
          >
            <i data-lucide="info" class="date-help-icon" aria-hidden="true"></i>
          </button>
          <div
            class="date-help-panel"
            data-date-help-target="panel"
            role="tooltip"
            hidden
          >
            <p class="date-help-title">Date can be:</p>
            <ul>
              <li>
                <code>today</code>, <code>yesterday</code>,
                <code>tomorrow</code>
              </li>
              <li><code>next month</code> (1st of next month)</li>
              <li><code>12 July 2026</code> or <code>12 Jul 2026</code></li>
              <li><code>2026-07-12</code> (ISO)</li>
              <li><code>12/07/2026</code> (day/month/year)</li>
            </ul>
          </div>
        </span>
      </span>
      <input
        type="text"
        name="quick_input"
        value="{{ .quickInput }}"
        placeholder="Description, amount, date"
      />
    </label>
    <p class="quick-hint">Example: Uber, 3344.22, today</p>
    {{ if .quickNeedsCategory }}
      <label>
        Category
        <select name="category_id">
          <option value="">Select a category</option>
          {{ range .categories }}
            <option value="{{ .ID }}">{{ .Name }}</option>
          {{ end }}
        </select>
      </label>
      <p class="quick-hint">
        First time for this description. Pick a category to remember it.
      </p>
    {{ end }}
    {{ template "submit_button" . }}
  </form>
{{ end }}
