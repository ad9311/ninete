{{ define "header" }}
  <header class="site-header">
    <a href="/" class="site-brand">NINETE</a>
    <label class="theme-switch" data-controller="theme">
      <span class="sr-only">Theme</span>
      <select data-theme-target="select" data-action="change->theme#change">
        <option value="auto">Automatic</option>
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
    </label>
    {{ if ne .currentUser nil }}
      <nav class="site-nav" data-controller="nav">
        <button
          class="site-nav-toggle"
          data-action="click->nav#toggle"
          aria-haspopup="true"
        >
          {{ .currentUser.Username }} <span class="site-nav-caret">▾</span>
        </button>
        <ul class="site-nav-dropdown" data-nav-target="dropdown">
          <li><a href="/expenses">Expenses</a></li>
          <li><a href="/recurrent-expenses">Recurrent Expenses</a></li>
          <li><a href="/macros">Macros</a></li>
          <li><a href="/foods">Food Directory</a></li>
          <li><a href="/exports">Exports</a></li>
          <li><a href="/moods">Moods</a></li>
          <li class="site-nav-divider"></li>
          <li>
            <form action="/logout" method="post" class="site-nav-logout">
              {{ template "csrf" . }}
              <button
                type="submit"
                class="site-nav-logout-btn"
                data-turbo-submits-with="Logging out..."
              >
                Logout
              </button>
            </form>
          </li>
        </ul>
      </nav>
    {{ end }}
  </header>
{{ end }}
